<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Kazooyak</title>

  <!-- viewport-fit + user-scalable=no: fill the notch, and stop double-tap zoom
       from firing mid-performance. -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1">

  <meta name="theme-color" content="#13151b">
  <meta name="description" content="A pocket diatonic chord instrument in your browser.">

  <!-- iOS standalone / homescreen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kazooyak">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
